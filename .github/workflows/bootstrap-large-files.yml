name: Bootstrap CRM application files

on:
  push:
    branches: [agent/build-cloudflare-crm]
    paths:
      - .bootstrap/crm-large-files.tar.gz.b64

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/build-cloudflare-crm
      - name: Extract application source
        run: |
          base64 --decode .bootstrap/crm-large-files.tar.gz.b64 | tar -xz
          rm -rf .bootstrap
          rm .github/workflows/bootstrap-large-files.yml
      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/index.html public/styles.css public/app.js scripts/dev-server.mjs src/worker.js .bootstrap .github/workflows/bootstrap-large-files.yml
          git commit -m "Add CRM application implementation"
          git push origin HEAD:agent/build-cloudflare-crm
