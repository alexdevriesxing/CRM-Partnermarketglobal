name: Apply Email Center v2.3

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/email-center-v23'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/email-center-v23
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply Email Center pass
        run: node scripts/apply-email-center-v23.mjs
      - name: Validate full repository
        run: npm run validate
      - name: Commit materialized source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Add first-class Email Center and CRM accessibility polish"
            git push origin HEAD:agent/email-center-v23
          fi
