name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize packaged CRM V2 source
        id: materialize
        run: |
          if [ -f .v2-package/READY ]; then
            find .v2-package -maxdepth 1 -type f -name 'part-*' -print0 | sort -z | xargs -0 cat > /tmp/pmg-crm-v2.b64
            base64 --decode /tmp/pmg-crm-v2.b64 > /tmp/pmg-crm-v2.tar.gz
            echo "230b6b705afdb069b471f48e6f8054d11ebb5cfa708ba322ec9ccfe3f53e97d7  /tmp/pmg-crm-v2.tar.gz" | sha256sum --check
            tar -xzf /tmp/pmg-crm-v2.tar.gz
            rm -f tests/integration.test.mjs .placeholder .v2-trigger .crm-v2-cleanup
            rm -rf .v2-package scripts/materialize-v2.mjs .github/workflows/assemble-v2.yml
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm install --ignore-scripts
      - run: npm run validate
      - name: Commit clean source to working branch
        if: steps.materialize.outputs.changed == 'true' && github.ref_name != 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize clean CRM V2 source"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
