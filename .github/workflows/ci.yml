name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize packaged CRM V2 source
        id: materialize
        shell: bash
        run: |
          if [ ! -f .v2-package/READY ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          {
            echo "Parts in lexical order:"
            find .v2-package -maxdepth 1 -type f -name 'part-*' -print | sort
            find .v2-package -maxdepth 1 -type f -name 'part-*' -print0 | sort -z | xargs -0 cat > /tmp/pmg-crm-v2.b64
            echo "Encoded bytes: $(wc -c < /tmp/pmg-crm-v2.b64)"
            base64 --decode /tmp/pmg-crm-v2.b64 > /tmp/pmg-crm-v2.tar.gz
            echo "Archive bytes: $(wc -c < /tmp/pmg-crm-v2.tar.gz)"
            sha256sum /tmp/pmg-crm-v2.tar.gz
            echo "Expected: 230b6b705afdb069b471f48e6f8054d11ebb5cfa708ba322ec9ccfe3f53e97d7"
            echo "230b6b705afdb069b471f48e6f8054d11ebb5cfa708ba322ec9ccfe3f53e97d7  /tmp/pmg-crm-v2.tar.gz" | sha256sum --check
            tar -tzf /tmp/pmg-crm-v2.tar.gz | head -80
            tar -xzf /tmp/pmg-crm-v2.tar.gz
          } > .materialize-diagnostics.txt 2>&1
          status=$?
          set -e
          cat .materialize-diagnostics.txt

          if [ "$status" -ne 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -f .materialize-diagnostics.txt tests/integration.test.mjs .placeholder .v2-trigger .crm-v2-cleanup
          rm -rf .v2-package scripts/materialize-v2.mjs .github/workflows/assemble-v2.yml
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        if: steps.materialize.outputs.failed != 'true'
        run: npm install --ignore-scripts
      - name: Validate CRM
        if: steps.materialize.outputs.failed != 'true'
        run: npm run validate
      - name: Commit materialized source or diagnostics
        if: always() && github.ref_name != 'main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          if [ "${{ steps.materialize.outputs.failed }}" = "true" ]; then
            git commit -m "Record CRM V2 materialization diagnostics"
          else
            git commit -m "Materialize clean CRM V2 source"
          fi
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
