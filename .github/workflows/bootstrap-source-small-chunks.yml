name: Assemble CRM application source from verified pieces

on:
  push:
    branches: [agent/build-cloudflare-crm]
    paths:
      - .bootstrap/chunks/chunk-09b

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/build-cloudflare-crm
          fetch-depth: 0
      - name: Verify and extract application source
        run: |
          test "$(find .bootstrap/chunks -type f -name 'chunk-*' | wc -l)" -eq 14
          cat .bootstrap/chunks/chunk-* | base64 --decode > /tmp/crm-large-files.tar.gz
          echo "98a418e4f97cfa8d5d6a7496b85c7acc122f8a38a1561755e6d0283b8ed84332  /tmp/crm-large-files.tar.gz" | sha256sum --check
          tar -xzf /tmp/crm-large-files.tar.gz
          test -f public/index.html
          test -f public/styles.css
          test -f public/app.js
          test -f scripts/dev-server.mjs
          test -f src/worker.js
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-large-files.yml
          rm -f .github/workflows/bootstrap-source-chunks.yml
          rm -f .github/workflows/bootstrap-source-small-chunks.yml
      - name: Validate extracted source
        run: |
          npm install
          npm run validate
      - name: Commit assembled application
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add CRM application implementation"
          git push origin HEAD:agent/build-cloudflare-crm
