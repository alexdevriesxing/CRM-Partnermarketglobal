name: Apply Final CRM Polish

on:
  push:
    branches: [agent/final-polish]
    paths:
      - '.final-polish-trigger'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  polish:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/final-polish'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/final-polish
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply final polish integration
        run: node scripts/apply-final-polish.mjs
      - name: Validate repository
        run: npm run validate
      - name: Upload validated polished source
        uses: actions/upload-artifact@v4
        with:
          name: final-polished-source
          path: |
            src/email.js
            src/worker.js
            package.json
            package-lock.json
            .github/workflows/deploy.yml
          if-no-files-found: error
