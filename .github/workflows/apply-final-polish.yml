name: Apply Final CRM Polish

on:
  push:
    branches: [agent/final-polish]
    paths:
      - '.final-polish-trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/final-polish
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply final polish integration
        run: node scripts/apply-final-polish.mjs
      - name: Validate repository
        run: npm run validate
      - name: Commit polished source
        run: |
          rm -f .final-polish-trigger
          git rm -f scripts/apply-final-polish.mjs .github/workflows/apply-final-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish CRM email operations and reliability"
          git push origin HEAD:agent/final-polish
