name: Apply Detailed Analytics Reporting v2.5

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/detailed-analytics-reporting-v25'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/detailed-analytics-reporting-v25
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply detailed reporting pass
        run: node scripts/apply-detailed-reporting-v25.mjs
      - name: Validate full repository
        id: validate
        shell: bash
        run: |
          set -o pipefail
          npm run validate 2>&1 | tee validation.log
      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detailed-reporting-validation
          path: validation.log
      - name: Commit materialized source
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f validation.log
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Add detailed analytics and management reporting"
            git push origin HEAD:agent/detailed-analytics-reporting-v25
          fi
