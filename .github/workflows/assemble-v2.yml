name: Materialize CRM V2 Source

on:
  push:
    branches: [main]
    paths:
      - '.v2-trigger'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Check source package
        id: source
        run: |
          if [ -f .v2-package/READY ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "CRM V2 source is already materialized."
          fi
      - uses: actions/setup-node@v4
        if: steps.source.outputs.ready == 'true'
        with:
          node-version: 22
      - name: Materialize and validate CRM V2
        if: steps.source.outputs.ready == 'true'
        run: |
          node scripts/materialize-v2.mjs
          rm -f tests/integration.test.mjs .placeholder .v2-trigger
          rm -rf .v2-package scripts/materialize-v2.mjs .github/workflows/assemble-v2.yml
          npm install --ignore-scripts
          npm run validate
      - name: Commit clean source
        if: steps.source.outputs.ready == 'true'
        run: |
          git config user.name "OpenAI Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize clean CRM V2 source"
          git push origin main
