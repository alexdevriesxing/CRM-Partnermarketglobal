name: Apply CRM Email Composer

on:
  push:
    branches: [agent/email-composer]
    paths:
      - '.email-composer-trigger'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/email-composer'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/email-composer
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply email composer integration
        run: node scripts/apply-email-composer.mjs
      - name: Validate CRM and email worker
        id: validation
        shell: bash
        run: |
          set +e
          npm run validate > email-validation.log 2>&1
          status=$?
          cat email-validation.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation diagnostics
        if: steps.validation.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: email-validation-log
          path: email-validation.log
          if-no-files-found: error
      - name: Commit integrated source
        if: steps.validation.outputs.status == '0'
        run: |
          rm -f email-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add integrated CRM email composer"
          git push origin HEAD:agent/email-composer
      - name: Fail when validation failed
        if: steps.validation.outputs.status != '0'
        run: exit 1
