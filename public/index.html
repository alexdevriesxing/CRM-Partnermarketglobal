<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="PartnerMarket Global multi-workspace CRM for accounts, contacts, follow-ups, tasks, pipeline and relationship intelligence.">
  <title>PartnerMarket Global CRM</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <a class="skip-link" href="#content">Skip to CRM content</a>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true">PM</div>
        <div><strong>PartnerMarket</strong><span>Global CRM</span></div>
        <button class="icon-button mobile-only" id="closeSidebar" aria-label="Close menu">×</button>
      </div>

      <label class="switcher-label" for="workspaceSwitcher">Database / workspace</label>
      <div class="workspace-switcher-wrap">
        <span class="workspace-dot" id="workspaceDot"></span>
        <select id="workspaceSwitcher" class="workspace-switcher" aria-label="Switch CRM database"></select>
        <button class="icon-button compact" id="newWorkspaceButton" title="Create workspace" aria-label="Create workspace">＋</button>
      </div>

      <nav class="main-nav">
        <button class="nav-item active" data-route="dashboard"><span>⌂</span><b>Dashboard</b></button>
        <button class="nav-item" data-route="agenda"><span>◷</span><b>My Day</b><em id="agendaCount"></em></button>
        <button class="nav-item" data-route="contacts"><span>◎</span><b>Contacts</b><em id="contactCount"></em></button>
        <button class="nav-item" data-route="organizations"><span>▦</span><b>Accounts</b></button>
        <button class="nav-item" data-route="prospecting"><span>◉</span><b>Prospecting</b><em id="prospectCount"></em></button>
        <button class="nav-item" data-route="activity"><span>↗</span><b>Contact Log</b></button>
        <button class="nav-item" data-route="email"><span>✉</span><b>Email Center</b><em id="emailFailureCount"></em></button>
        <button class="nav-item" data-route="pipeline"><span>◫</span><b>Pipeline</b></button>
        <button class="nav-item" data-route="tasks"><span>✓</span><b>Tasks</b><em id="taskCount"></em></button>
        <button class="nav-item" data-route="analytics"><span>⌁</span><b>Analytics</b></button>
        <button class="nav-item" data-route="intelligence"><span>◈</span><b>Commercial Intel</b><em id="intelligenceRiskCount"></em></button>
      </nav>

      <div class="nav-section-label">Manage</div>
      <nav class="main-nav secondary">
        <button class="nav-item" data-route="data"><span>⇅</span><b>Import & export</b></button>
        <button class="nav-item" data-route="settings"><span>⚙</span><b>Settings</b></button>
      </nav>

      <div class="sidebar-footer">
        <button class="user-card" id="userMenuButton">
          <span class="avatar" id="userAvatar">AD</span>
          <span><strong id="userName">Alex de Vries</strong><small id="userRole">Admin</small></span>
          <span>⋯</span>
        </button>
      </div>
    </aside>

    <div class="app-main">
      <header class="topbar">
        <button class="icon-button mobile-only" id="openSidebar" aria-label="Open menu">☰</button>
        <div class="global-search-wrap">
          <span aria-hidden="true">⌕</span>
          <input id="globalSearch" type="search" placeholder="Search contacts, accounts and deals…" autocomplete="off" aria-label="Search contacts, accounts and deals" aria-controls="searchResults" aria-expanded="false">
          <kbd>⌘K</kbd>
          <div class="search-results" id="searchResults" role="listbox" hidden></div>
        </div>
        <div class="account-context">
          <label for="accountSwitcher">Account</label>
          <select id="accountSwitcher" aria-label="Filter by account"><option value="">All accounts</option></select>
          <button class="small-button" id="clearAccountFilter" hidden>Clear</button>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
          <button class="button secondary" data-quick="task">＋ Task</button>
          <button class="button primary" data-quick="activity">＋ Log contact</button>
        </div>
      </header>

      <main id="content" class="content" tabindex="-1" aria-live="polite"></main>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header><div><p class="eyebrow" id="modalEyebrow">Create</p><h2 id="modalTitle">New record</h2></div><button class="icon-button" id="modalClose" aria-label="Close">×</button></header>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <aside class="drawer" id="detailDrawer" aria-label="Record details" hidden>
    <header><div><p class="eyebrow" id="drawerEyebrow">Details</p><h2 id="drawerTitle">Record</h2></div><button class="icon-button" id="drawerClose" aria-label="Close details">×</button></header>
    <div id="drawerBody" class="drawer-body"></div>
  </aside>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script src="/app.js" type="module"></script>
  <script src="/email.js" type="module"></script>
</body>
</html>
